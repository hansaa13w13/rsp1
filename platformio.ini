; ─── Varsayılan ortam — yalnızca bu yüklenir (pio run / pio run -t upload) ───
[platformio]
default_envs = esp32c3-super-mini

; ─── Ortak ayarlar ────────────────────────────────────────────────────────────
[common]
build_flags_base =
  -Wl,-z,muldefs
  -O2
  -fno-exceptions
  -fno-rtti
  -DCORE_DEBUG_LEVEL=0

; ─── ESP32-C3 Super Mini — birincil hedef ─────────────────────────────────────
; CPU: 160 MHz (ESP32-C3 donanım maksimumu — daha fazla overclock mümkün değil)
; Flash: 80 MHz QIO — kod okuma 2× hızlanır
; -O2: derleyici optimizasyonu, döngüler ve sniffer kodu sıkıştırılır
[env:esp32c3-super-mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino
board_build.f_cpu   = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
build_flags =
  ${common.build_flags_base}
  -DCONFIG_ESP32C3_DEFAULT_CPU_FREQ_160=1
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=1
monitor_speed = 115200
upload_speed  = 921600

; ─── ESP32 DOIT DevKit — 240 MHz ──────────────────────────────────────────────
[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
board_build.f_cpu   = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
build_flags =
  ${common.build_flags_base}
monitor_speed = 115200
upload_speed  = 921600

; ─── ESP32-S3 DevKit — 240 MHz ────────────────────────────────────────────────
[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
board_build.f_cpu   = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
