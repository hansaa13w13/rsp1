  ${common.build_flags_base}
monitor_speed = 115200
upload_speed  = 921600

; ─── Adafruit QT Py ESP32-C3 ─────────────────────────────────────────────────
[env:adafruit_qtpy_esp32c3]
platform = espressif32
board = adafruit_qtpy_esp32c3
framework = arduino
